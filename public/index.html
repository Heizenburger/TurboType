<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboType | Login</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Auto-forward logged-in users, preserving their room locks or redirects
        if (localStorage.getItem('token')) {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');
            if (redirectUrl) window.location.href = redirectUrl;
            else {
                const activeRoomUrl = localStorage.getItem('activeRoomUrl');
                window.location.href = activeRoomUrl ? activeRoomUrl : 'hub.html';
            }
        }
    </script>
</head>
<body>
    <div id="ui-container" style="max-width: 400px; margin: auto;">
        <h1 class="arcade-title">TURBO TYPE</h1>
        
        <div id="login-section">
            <h2>LOGIN</h2>
            <input type="text" id="login-id" class="diff-select" placeholder="Email or Gamertag">
            <input type="password" id="login-pass" class="diff-select" placeholder="Password">
            <button id="login-btn" style="width: 100%; margin-top: 15px; padding: 12px; cursor: pointer;">ENTER</button>
            <p style="margin-top: 15px; cursor: pointer; color: var(--primary);" onclick="toggleAuth()">Need an account? Sign up</p>
        </div>

        <div id="signup-section" style="display: none;">
            <h2>SIGN UP</h2>
            <input type="email" id="reg-email" class="diff-select" placeholder="Email">
            <input type="text" id="reg-gamertag" class="diff-select" placeholder="Gamertag">
            <input type="password" id="reg-pass" class="diff-select" placeholder="Password">
            
            <p style="text-align: left; margin-bottom: 5px;">Select Avatar:</p>
            <select id="reg-avatar" class="diff-select">
                <option value="1">Ninja</option>
                <option value="2">Racer</option>
                <option value="3">Hacker</option>
                <option value="4">Cyborg</option>
                <option value="5">Ghost</option>
            </select>

            <button id="signup-btn" style="width: 100%; margin-top: 15px; padding: 12px; cursor: pointer;">CREATE ACCOUNT</button>
            <p style="margin-top: 15px; cursor: pointer; color: var(--primary);" onclick="toggleAuth()">Already have an account? Login</p>
        </div>
        <p id="auth-error" style="color: #ef4444; margin-top: 15px; display: none;"></p>
    </div>
    <script src="auth.js"></script>
</body>
</html>
