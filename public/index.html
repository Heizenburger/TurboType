<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboType | Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Neon Upgrade for Login Box */
        body { margin: 0; background: #0f172a; overflow: hidden; }
        #ui-container {
            position: relative;
            z-index: 10;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.15), inset 0 0 20px rgba(99, 102, 241, 0.05);
            padding: 40px;
        }
        .arcade-title {
            color: #fff;
            text-shadow: 0 0 10px #6366f1, 0 0 20px #6366f1;
            letter-spacing: 3px;
        }
        h2 { color: #cbd5e1; font-family: monospace; letter-spacing: 1px; }
        #login-btn, #signup-btn {
            background: #6366f1; color: white; border: none; font-weight: bold;
            letter-spacing: 1px; transition: 0.3s; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
        #login-btn:hover, #signup-btn:hover {
            transform: translateY(-2px); box-shadow: 0 0 25px rgba(99, 102, 241, 0.8);
        }
    </style>
    <script>
        if (localStorage.getItem('token')) {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');
            if (redirectUrl) window.location.href = redirectUrl;
            else {
                const activeRoomUrl = localStorage.getItem('activeRoomUrl');
                window.location.href = activeRoomUrl ? activeRoomUrl : 'hub.html';
            }
        }
    </script>
</head>
<body>
    <div id="ui-container" style="max-width: 400px; margin: auto; margin-top: 10vh; border-radius: 16px;">
        <h1 class="arcade-title">TURBO TYPE</h1>
        
        <div id="login-section">
            <h2>LOGIN</h2>
            <input type="text" id="login-id" class="diff-select" placeholder="Email or Gamertag">
            <input type="password" id="login-pass" class="diff-select" placeholder="Password">
            <button id="login-btn" style="width: 100%; margin-top: 20px; padding: 15px; border-radius: 8px; cursor: pointer;">ENTER SYSTEM</button>
            <p style="margin-top: 20px; cursor: pointer; color: #a5b4fc; font-weight: bold; text-align: center;" onclick="toggleAuth()">Need an account? Sign up</p>
        </div>

        <div id="signup-section" style="display: none;">
            <h2>SIGN UP</h2>
            <input type="email" id="reg-email" class="diff-select" placeholder="Email">
            <input type="text" id="reg-gamertag" class="diff-select" placeholder="Gamertag">
            <input type="password" id="reg-pass" class="diff-select" placeholder="Password">
            
            <p style="text-align: left; margin-bottom: 5px; color: #94a3b8; font-weight: bold;">Select Avatar:</p>
            <select id="reg-avatar" class="diff-select">
                <option value="1">Ninja</option>
                <option value="2">Racer</option>
                <option value="3">Hacker</option>
                <option value="4">Cyborg</option>
                <option value="5">Ghost</option>
            </select>

            <button id="signup-btn" style="width: 100%; margin-top: 20px; padding: 15px; border-radius: 8px; cursor: pointer;">CREATE ACCOUNT</button>
            <p style="margin-top: 20px; cursor: pointer; color: #a5b4fc; font-weight: bold; text-align: center;" onclick="toggleAuth()">Already have an account? Login</p>
        </div>
        <p id="auth-error" style="color: #ef4444; margin-top: 15px; display: none; font-weight: bold; text-align: center; text-shadow: 0 0 10px #ef4444;"></p>
    </div>

    <script>
        function initKeyboardBg() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0'; canvas.style.left = '0';
            canvas.style.width = '100vw'; canvas.style.height = '100vh';
            canvas.style.zIndex = '1'; canvas.style.pointerEvents = 'none';
            document.body.prepend(canvas);

            const ctx = canvas.getContext('2d');
            let w, h, cols, rows;
            const size = 35; // Size of each key
            let mouseX = -1000, mouseY = -1000;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                cols = Math.ceil(w / size);
                rows = Math.ceil(h / size);
            }
            window.addEventListener('resize', resize); resize();
            window.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });

            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*<>".split("");
            const grid = Array.from({length: 3000}, () => chars[Math.floor(Math.random()*chars.length)]);

            function draw() {
                ctx.clearRect(0, 0, w, h);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.font = '14px monospace';

                let i = 0;
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        const px = x * size + size/2;
                        const py = y * size + size/2;
                        
                        const dist = Math.hypot(mouseX - px, mouseY - py);
                        let alpha = dist < 200 ? 1 - (dist / 200) : 0;

                        if (Math.random() < 0.005) grid[i] = chars[Math.floor(Math.random()*chars.length)];

                        // Draw Key Box
                        ctx.beginPath();
                        ctx.roundRect(px - size/2 + 2, py - size/2 + 2, size - 4, size - 4, 4);
                        if (alpha > 0.05) {
                            ctx.strokeStyle = `rgba(99, 102, 241, ${alpha + 0.2})`;
                            ctx.fillStyle = `rgba(99, 102, 241, ${alpha * 0.15})`;
                            ctx.shadowBlur = 15 * alpha; ctx.shadowColor = '#6366f1';
                        } else {
                            ctx.strokeStyle = `rgba(51, 65, 85, 0.3)`;
                            ctx.fillStyle = 'transparent'; ctx.shadowBlur = 0;
                        }
                        ctx.fill(); ctx.stroke();

                        // Draw Text
                        ctx.fillStyle = alpha > 0.05 ? `rgba(255, 255, 255, ${alpha + 0.5})` : `rgba(100, 116, 139, 0.4)`;
                        ctx.fillText(grid[i], px, py);
                        i++;
                    }
                }
                requestAnimationFrame(draw);
            }
            draw();
        }
        initKeyboardBg();
    </script>
    <script src="auth.js"></script>
</body>
</html>
