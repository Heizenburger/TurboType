<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboType | Enter the Mainframe</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('token')) {
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect');
            if (redirectUrl) window.location.href = redirectUrl;
            else {
                const activeRoomUrl = localStorage.getItem('activeRoomUrl');
                window.location.href = activeRoomUrl ? activeRoomUrl : 'hub.html';
            }
        }
    </script>
    <style>
        body {
            background: #020617; 
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', monospace, sans-serif;
        }

        /* --- INTERACTIVE FLOATING KEYBOARD --- */
        .keyboard-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden; pointer-events: none;
        }
        
        .key-wrapper {
            position: absolute; bottom: -100px;
            animation: floatUp linear infinite;
        }

        .floating-key {
            width: 60px; height: 60px;
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-family: monospace; font-size: 1.2rem; font-weight: bold;
            transition: transform 0.15s ease-out, box-shadow 0.2s, background 0.2s;
        }

        /* Colors & Glows */
        .key-green { background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); color: rgba(16, 185, 129, 0.3); box-shadow: 0 0 15px rgba(16, 185, 129, 0.1); }
        .key-blue { background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2); color: rgba(59, 130, 246, 0.3); box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .key-red { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); color: rgba(239, 68, 68, 0.3); box-shadow: 0 0 15px rgba(239, 68, 68, 0.1); }

        /* Cursor Interaction Classes */
        .key-green.active { background: rgba(16, 185, 129, 0.2); color: #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.6); text-shadow: 0 0 10px #10b981; }
        .key-blue.active { background: rgba(59, 130, 246, 0.2); color: #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.6); text-shadow: 0 0 10px #3b82f6; }
        .key-red.active { background: rgba(239, 68, 68, 0.2); color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); text-shadow: 0 0 10px #ef4444; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        /* --- NEON UI --- */
        .neon-container {
            position: relative; z-index: 10;
            background: rgba(15, 23, 42, 0.85) !important;
            border: 2px solid #3b82f6 !important;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.3), inset 0 0 20px rgba(59, 130, 246, 0.2) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            padding: 40px !important;
            width: 90%; max-width: 400px; margin: 10vh auto auto auto;
        }

        .neon-title {
            color: #fff; text-align: center; margin-top: 0;
            text-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6, 0 0 40px #3b82f6;
            letter-spacing: 4px; font-weight: 900; font-size: 2.2rem;
        }

        .auth-input {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #334155 !important;
            color: #fff !important;
        }
        .auth-input:focus { border-color: #10b981 !important; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        .auth-btn {
            background: #3b82f6; color: white; width: 100%; margin-top: 15px; padding: 14px; 
            border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            letter-spacing: 1px; transition: 0.2s; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        .auth-btn:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6); }
        .auth-btn-green { background: #10b981; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .auth-btn-green:hover { background: #059669; box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6); }

        .toggle-link {
            display: block; text-align: center; margin-top: 20px; font-weight: bold;
            color: #94a3b8; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .toggle-link:hover { color: #fff; text-shadow: 0 0 8px #fff; }
    </style>
</head>
<body>

    <div class="keyboard-bg" id="key-bg">
        <div class="key-wrapper" style="left: 10%; animation-duration: 12s; animation-delay: 0s;"><div class="floating-key key-blue">W</div></div>
        <div class="key-wrapper" style="left: 25%; animation-duration: 15s; animation-delay: 2s;"><div class="floating-key key-green">{ }</div></div>
        <div class="key-wrapper" style="left: 45%; animation-duration: 10s; animation-delay: 5s;"><div class="floating-key key-red">ESC</div></div>
        <div class="key-wrapper" style="left: 60%; animation-duration: 14s; animation-delay: 1s;"><div class="floating-key key-blue">A</div></div>
        <div class="key-wrapper" style="left: 75%; animation-duration: 11s; animation-delay: 4s;"><div class="floating-key key-green">=></div></div>
        <div class="key-wrapper" style="left: 85%; animation-duration: 13s; animation-delay: 3s;"><div class="floating-key key-blue">S</div></div>
        <div class="key-wrapper" style="left: 20%; animation-duration: 16s; animation-delay: 7s;"><div class="floating-key key-red">CTRL</div></div>
        <div class="key-wrapper" style="left: 80%; animation-duration: 12s; animation-delay: 6s;"><div class="floating-key key-green">/</div></div>
        <div class="key-wrapper" style="left: 35%; animation-duration: 18s; animation-delay: 8s;"><div class="floating-key key-blue">D</div></div>
        <div class="key-wrapper" style="left: 50%; animation-duration: 14s; animation-delay: 9s;"><div class="floating-key key-red">ALT</div></div>
    </div>

    <div id="ui-container" class="neon-container">
        <h1 class="neon-title">TURBO TYPE</h1>
        
        <div id="login-section">
            <h2 style="color: #94a3b8; text-align: center; font-size: 1rem; letter-spacing: 2px;">SYSTEM LOGIN</h2>
            <input type="text" id="login-id" class="diff-select auth-input" placeholder="Email or Gamertag">
            <input type="password" id="login-pass" class="diff-select auth-input" placeholder="Password">
            
            <p id="auth-error" style="color: #ef4444; display: none; text-align: center; font-weight: bold; margin-top: 10px; font-size: 0.9rem;"></p>
            
            <button id="login-btn" class="auth-btn">ENTER MAINFRAME</button>
            <span class="toggle-link" onclick="toggleAuth()">Need an account? Init Signup_</span>
        </div>

        <div id="signup-section" style="display: none;">
            <h2 style="color: #94a3b8; text-align: center; font-size: 1rem; letter-spacing: 2px;">NEW USER REGISTRATION</h2>
            <input type="email" id="reg-email" class="diff-select auth-input" placeholder="Email Address">
            <input type="text" id="reg-gamertag" class="diff-select auth-input" placeholder="Gamertag">
            <input type="password" id="reg-pass" class="diff-select auth-input" placeholder="Password">
            
            <p style="text-align: left; margin: 15px 0 5px 0; color: #94a3b8; font-size: 0.85rem; font-weight: bold;">SELECT AVATAR:</p>
            <select id="reg-avatar" class="diff-select auth-input">
                <option value="1">Ninja</option>
                <option value="2">Racer</option>
                <option value="3">Hacker</option>
                <option value="4">Cyborg</option>
                <option value="5">Ghost</option>
            </select>

            <button id="signup-btn" class="auth-btn auth-btn-green">CREATE NODE</button>
            <span class="toggle-link" onclick="toggleAuth()">< Return to Login</span>
        </div>
    </div>

    <script>
        document.addEventListener('mousemove', (e) => {
            const keys = document.querySelectorAll('.floating-key');
            keys.forEach(key => {
                const rect = key.getBoundingClientRect();
                const keyCenterX = rect.left + rect.width / 2;
                const keyCenterY = rect.top + rect.height / 2;
                const dist = Math.hypot(e.clientX - keyCenterX, e.clientY - keyCenterY);

                if (dist < 150) {
                    // Magnetic Repel Effect + Glow Activation
                    const pushX = ((keyCenterX - e.clientX) / dist) * 30;
                    const pushY = ((keyCenterY - e.clientY) / dist) * 30;
                    key.style.transform = `translate(${pushX}px, ${pushY}px) scale(1.2)`;
                    key.classList.add('active');
                } else {
                    key.style.transform = `translate(0px, 0px) scale(1)`;
                    key.classList.remove('active');
                }
            });
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
