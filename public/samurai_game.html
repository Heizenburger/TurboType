<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TurboType: Samurai Survival</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="samurai_theme.css" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (!localStorage.getItem('token')) window.location.href = 'index.html';
    </script>
</head>
<body>

    <div id="loading-screen" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-family: monospace; color: #3b82f6;">
        INITIALIZING JAPAN PROTOCOLS...
    </div>

    <div id="game-ui" style="display: none;">
        <div class="stats-bar">
            <div>WAVE: <span id="ui-wave">1</span></div>
            <div style="margin-top: 5px;">SCORE: <span id="ui-score">0</span></div>
            <div class="hp-bar-container">
                <div id="ui-hp-fill" class="hp-fill"></div>
            </div>
        </div>

        <button onclick="window.location.href='hub.html'" class="back-btn" title="Return to Hub">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            ABORT
        </button>

        <div id="wave-announcement" class="wave-announcement">WAVE 1</div>
        <input type="text" id="target-input" autocomplete="off" spellcheck="false" />
    </div>

    <div id="end-screen" class="modal">
        <div class="modal-box">
            <h1 class="arcade-title" style="margin-top: 0; color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.5);">OVERWHELMED</h1>
            <div style="font-size: 1.2rem; color: #cbd5e1; margin-bottom: 20px; font-family: monospace;">
                <p>WAVES CLEARED: <span id="final-wave" style="color: #60a5fa; font-weight: bold;">--</span></p>
                <p>SCORE: <span id="final-score" style="color: #60a5fa; font-weight: bold;">--</span></p>
                <p>SPEED: <span id="final-wpm" style="color: #10b981; font-weight: bold;">--</span> WPM</p>
            </div>
            <p id="save-status" style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px;">Saving Combat Logs...</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="modal-btn" style="background: #334155; color: white;" onclick="window.location.href='hub.html'">HUB</button>
                <button class="modal-btn btn-primary" onclick="window.location.reload()">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script src="samurai.js"></script>
</body>
</html>
