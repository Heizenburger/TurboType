<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TurboType: Samurai Survival</title>
    <style>body { margin: 0; background-color: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }</style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>

<script>
const config = {
    type: Phaser.AUTO, width: 800, height: 400,
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

// --- DESIGN VARIABLES ---
const PLAYER_MAX_HEALTH = 100;
const ENEMY_DAMAGE = 20;
const ATTACK_RANGE_ENEMY = 190; 
const KILL_RANGE_PLAYER = 250;  

// --- ADAPTIVE DICTIONARY ---
const wordsEasy = ["CAT", "DOG", "RUN", "JUMP", "HIT", "SWORD", "DASH", "WIND", "FIRE"];
const wordsMedium = ["BLADE", "STRIKE", "NINJA", "SHADOW", "TURBO", "GLITCH", "HYPER", "KICK"];
const wordsHard = ["SAMURAI", "ASSASSIN", "SHURIKEN", "VENGEANCE", "PHANTOM", "WARRIOR"];

// --- GLOBAL VARIABLES ---
let player;
let enemies;
let background;
let scrollSpeed = 0;
let currentHealth = PLAYER_MAX_HEALTH;
let healthBar;
let currentWord = "START";
let userInput = "";
let scoreText, wordText, uiScoreText;
let score = 0;
let isGameOver = false;
let spawnTimer;
let currentSpawnDelay = 3000; // Starts at 3 seconds

function preload () {
    this.load.image('city', 'assets/bg.png'); 
    this.load.spritesheet('hero_idle', 'assets/player_idle.png', { frameWidth: 96, frameHeight: 96 });
    this.load.spritesheet('hero_run', 'assets/player_run.png', { frameWidth: 96, frameHeight: 96 });
    this.load.spritesheet('hero_attack', 'assets/player_attack.png', { frameWidth: 96, frameHeight: 96 });
}

function create () {
    background = this.add.tileSprite(400, 200, 800, 400, 'city');

    // --- ANIMATIONS ---
    this.anims.create({ key: 'idle', frames: this.anims.generateFrameNumbers('hero_idle', { start: 0, end: 9 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'run', frames: this.anims.generateFrameNumbers('hero_run', { start: 0, end: 7 }), frameRate: 12, repeat: -1 });
    this.anims.create({ key: 'attack', frames: this.anims.generateFrameNumbers('hero_attack', { start: 0, end: 5 }), frameRate: 15, repeat: 0 });

    // --- PLAYER ---
    player = this.physics.add.sprite(150, 345, 'hero_idle').setScale(2).play('idle');
    player.body.setSize(30, 80); 

    // --- ENEMIES ---
    enemies = this.physics.add.group();
    spawnTimer = this.time.addEvent({ delay: currentSpawnDelay, callback: spawnEnemy, callbackScope: this, loop: true });

    // --- UI ---
    this.add.rectangle(150, 50, 200, 20, 0x555555).setOrigin(0, 0.5);
    healthBar = this.add.rectangle(150, 50, 200, 20, 0x00ff00).setOrigin(0, 0.5);
    this.add.text(100, 50, "HP", { fontSize: '20px', fontStyle: 'bold' }).setOrigin(0.5);
    
    uiScoreText = this.add.text(20, 80, "SCORE: 0", { fontSize: '24px', fontStyle: 'bold', fill: '#fff' });

    wordText = this.add.text(400, 100, currentWord, { fontSize: '40px', fill: '#fff', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5);
    scoreText = this.add.text(400, 350, 'TYPE "START"', { fontSize: '20px', fill: '#0f0', backgroundColor: '#000' }).setOrigin(0.5);

    // --- INPUT ---
    this.input.keyboard.on('keydown', (event) => {
        if (isGameOver) {
            if (event.keyCode === 13) location.reload(); // Press ENTER to Restart
            return;
        }
        if (event.keyCode >= 65 && event.keyCode <= 90) {
            userInput += event.key.toUpperCase();
            checkInput();
        } else if (event.keyCode === 8) { // Backspace support
            userInput = userInput.slice(0, -1);
            scoreText.setText(userInput);
            wordText.setColor('#ffffff');
        }
    });

    this.physics.add.overlap(player, enemies, takeDamage, null, this);
    
    player.on('animationcomplete', function (anim) {
        if (anim.key === 'attack') {
            if (scrollSpeed > 0) player.play('run'); else player.play('idle');
        }
    }, this);
}

function update () {
    if (isGameOver) return;

    background.tilePositionX += scrollSpeed;

    if (player.anims.currentAnim.key !== 'attack') {
        if (scrollSpeed > 0.1) {
            player.play('run', true);
            scrollSpeed *= 0.98;
        } else {
            scrollSpeed = 0;
            player.play('idle', true);
        }
    }

    enemies.children.iterate(function (enemy) {
        if (enemy && enemy.active) {
            let dist = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
            if (dist < ATTACK_RANGE_ENEMY && enemy.anims.currentAnim.key !== 'attack') {
                enemy.play('attack');
            } else if (dist >= ATTACK_RANGE_ENEMY && enemy.anims.currentAnim.key !== 'run') {
                enemy.play('run');
            }
        }
    });
}

function spawnEnemy() {
    if (isGameOver) return;
    let enemy = enemies.create(850, 345, 'hero_run').setScale(2).setFlipX(true).setTint(0xff0000).play('run'); 
    
    // Enemies get faster as score increases
    let speedBoost = Math.min(score * 2, 200); 
    let randomSpeed = Phaser.Math.Between(100 + speedBoost, 200 + speedBoost);
    
    enemy.setVelocityX(-randomSpeed);
    enemy.checkWorldBounds = true;
    enemy.outOfBoundsKill = true;
}

function checkInput() {
    scoreText.setText(userInput);

    if (userInput === currentWord) {
        // SUCCESS
        scrollSpeed += 5;
        userInput = "";
        player.play('attack');
        
        let closestEnemy = null;
        let minDist = 9999;

        enemies.children.iterate(function (child) {
            if (child.active) {
                let dist = Phaser.Math.Distance.Between(player.x, player.y, child.x, child.y);
                if (dist < minDist) { minDist = dist; closestEnemy = child; }
            }
        });

        // Range Check & Scoring
        if (closestEnemy && minDist < KILL_RANGE_PLAYER) {
            closestEnemy.destroy();
            score += 10;
            uiScoreText.setText("SCORE: " + score);
            showFloatingText("HIT!", 0x00ff00);
            
            // Adaptive Difficulty: Spawns get faster
            if (currentSpawnDelay > 1000) {
                currentSpawnDelay -= 50;
                spawnTimer.delay = currentSpawnDelay;
            }
        } else {
            showFloatingText("MISS!", 0xffa500); // Orange Miss text
        }

        // Adaptive Dictionary Selection
        let wordList = wordsEasy;
        if (score >= 50 && score < 150) wordList = wordsMedium;
        else if (score >= 150) wordList = wordsHard;

        currentWord = wordList[Math.floor(Math.random() * wordList.length)];
        wordText.setText(currentWord);
        wordText.setColor('#00ff00');
    } 
    else if (!currentWord.startsWith(userInput)) {
        userInput = "";
        wordText.setColor('#ff0000');
    } else {
        wordText.setColor('#ffffff');
    }
}

function showFloatingText(msg, color) {
    let popup = game.scene.scenes[0].add.text(player.x + 50, player.y - 50, msg, { fontSize: '24px', fontStyle: 'bold', fill: '#fff' });
    popup.setTint(color);
    game.scene.scenes[0].tweens.add({ targets: popup, y: popup.y - 50, alpha: 0, duration: 800, onComplete: () => popup.destroy() });
}

function takeDamage(player, enemy) {
    enemy.destroy();
    currentHealth -= ENEMY_DAMAGE;
    healthBar.width = 200 * Math.max(0, currentHealth / PLAYER_MAX_HEALTH);
    player.setTint(0xff0000);
    setTimeout(() => player.clearTint(), 200);

    if (currentHealth <= 0) {
        isGameOver = true;
        this.physics.pause();
        player.setTint(0x555555);
        wordText.setText("GAME OVER\nPress ENTER to Restart").setAlign('center');
        player.anims.stop(); 
    }
}
</script>

</body>
</html>
