<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboType Hub</title>
    <style>
        /* Keep your existing CSS here */
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; }
        h1 { font-size: 3rem; color: #6366f1; text-transform: uppercase; letter-spacing: 4px; }
        .menu { display: flex; gap: 20px; margin-top: 30px; }
        .card { padding: 20px 40px; background: #222; border: 2px solid #333; border-radius: 12px; text-align: center; transition: 0.3s; cursor: pointer; text-decoration: none; color: white; }
        .card:hover { border-color: #6366f1; transform: translateY(-5px); }
        .card h2 { margin: 0 0 10px 0; }
        .tag { font-size: 0.8rem; padding: 4px 8px; border-radius: 4px; }
        .online { background: #2ecc71; color: #000; }
        .local { background: #f1c40f; color: #000; }

        /* NEW: User Profile Header */
        #user-header {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: #222;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #444;
        }
        #user-header span { font-weight: bold; color: #6366f1; }
        .header-btn { background: none; border: none; color: white; cursor: pointer; font-size: 0.9rem; text-decoration: underline; }
        .header-btn:hover { color: #ef4444; }
    </style>
    <script>
        // ROUTE PROTECTION: If no token exists, redirect back to login immediately
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body>

    <div id="user-header">
        <div>Avatar <span id="display-avatar"></span></div>
        <span id="display-gamertag"></span>
        <a href="account.html" style="color: white; font-size: 0.9rem;">Account</a>
        <button class="header-btn" onclick="logout()">Logout</button>
    </div>

    <h1>Turbo Type</h1>
    <p>Select a Game Mode</p>

    <div class="menu">
        <a href="samurai_game.html" class="card">
            <h2>Samurai Survival</h2>
            <span class="tag online">Playable Online</span>
            <p>Single Player Campaign</p>
        </a>

        <a href="turbo_racing.html" class="card">
            <h2>Turbo Racing</h2>
            <span class="tag local">Requires Local Server</span>
            <p>Multiplayer 1v1</p>
        </a>

        <a href="syntax_arena.html" class="card" style="border-color: #10b981;">
            <h2 style="color: #10b981;">Syntax Arena</h2>
            <span class="tag online">PvP Online</span>
            <p>Strict-Mode C++ Hacker Battles</p>
        </a>

        <a href="colosseum.html" class="card" style="border-color: #e11d48;">
            <h2 style="color: #e11d48;">Colosseum Raid</h2>
            <span class="tag online">Co-op PvE Server</span>
            <p>Type Lore to Slay the Global Boss</p>
        </a>
    </div>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'index.html';
        } else {
            // AUTO-RECONNECT: Prevent joining new games if locked in
            const activeRoomUrl = localStorage.getItem('activeRoomUrl');
            if (activeRoomUrl) {
                alert("You are currently in an active game. Reconnecting...");
                window.location.href = activeRoomUrl;
            }
        }

        document.getElementById('display-gamertag').innerText = localStorage.getItem('gamertag');
        document.getElementById('display-avatar').innerText = localStorage.getItem('avatar');

        function logout() {
            localStorage.clear(); // Clears token AND active game locks
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
